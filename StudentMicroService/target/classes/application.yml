#spring.application.name=StudentMicroService
spring:
  application:
    name: StudentMicroService
  web:
    error:
      whitelabel:
        enabled: false
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:file:./testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  jackson:
    deserialization:
      fail-on-null-for-primitives: false
eureka:
  client:
    service-url:
      default-zone: http://localhost:8761/eureka
server:
  port: 2222